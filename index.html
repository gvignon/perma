<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jardin Interactif 2026</title>
    <style>
        :root {
            --green-dark: #1b5e20; --green-main: #4caf50; --green-soft: #e8f5e9;
            --earth: #795548; --white: #ffffff; --planted: #81c784; --tomato-red: #e53935;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f4; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        header { background: var(--green-dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--green-dark); border-bottom: 2px solid var(--green-soft); padding-bottom: 8px; margin-top: 0; }
        
        /* Calendrier */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 10px; }
        .calendar-day-head { font-weight: bold; padding: 5px; color: var(--earth); font-size: 0.8em; text-transform: uppercase; }
        .calendar-day { padding: 15px 2px; background: #fafafa; border-radius: 5px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; font-size: 0.9em; min-height: 40px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .calendar-day:hover { background: var(--green-soft); border-color: var(--green-main); }
        .empty { background: transparent; cursor: default; }
        .planted-day { background-color: var(--planted) !important; color: white; font-weight: bold; }
        .today { border: 2px solid var(--earth) !important; font-weight: bold; }
        .planted-day::after { content: "🌱"; font-size: 0.7em; }

        /* Progress Bar */
        .progress-bar { background: #ddd; border-radius: 20px; height: 16px; width: 100%; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .progress-fill { height: 100%; width: 0%; transition: width 1.5s ease-out; }
        .fill-green { background: var(--green-main); }
        .fill-red { background: var(--tomato-red); }
        small { color: #666; font-style: italic; display: block; margin-top: -5px; margin-bottom: 15px; }

        /* Modal */
        #modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 380px; border-radius: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: var(--green-main); color: white; font-weight: bold; border: none; cursor: pointer; }
        .btn-cancel { background: #f0f0f0; border: none; cursor: pointer; color: #555; }

        #output-section { border: 2px dashed var(--green-main); background: #f9fff9; padding: 15px; border-radius: 12px; }
        #output-text { display: block; background: #fff; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; word-break: break-all; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌿 Mon Jardin Interactif</h1>
        <p>Potager Perma - Saison 2026</p>
    </header>

    <section class="card">
        <h2>📅 Mars 2026</h2>
        <div id="calendar" class="calendar-grid"></div>
    </section>

    <section class="card">
        <h2>📈 État de Croissance</h2>
        
        <h3>🌱 Petit Pois "Karina"</h3>
        <div class="progress-bar"><div id="progres-pois" class="progress-fill fill-green"></div></div>
        <small id="text-pois">Chargement...</small>

        <h3>🍅 Tomate "Cherokee Purple"</h3>
        <div class="progress-bar"><div id="progres-tomates" class="progress-fill fill-red"></div></div>
        <small id="text-tomates">Chargement...</small>
    </section>

    <div id="output-section" style="display:none;" class="card">
        <h3>💾 Copie pour Gemini</h3>
        <code id="output-text"></code>
        <p style="font-size:0.85em; color: #444;">📋 Copie ce texte et colle-le dans notre chat pour que je mette ma mémoire à jour !</p>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-date" style="color:var(--green-dark); margin-top:0;">Action du jour</h3>
        <label for="plant-select" style="font-size: 0.9em;">Plante concernée :</label>
        <select id="plant-select">
            <option value="Tomates Cherokee Purple">Tomates Cherokee Purple</option>
            <option value="Courgettes Rheinau Gold">Courgettes Rheinau Gold</option>
            <option value="Pois Karina">Pois Karina</option>
            <option value="Radis Flamboyant">Radis Flamboyant</option>
            <option value="Autre">Autre (Observation)</option>
        </select>
        <label for="action-desc" style="font-size: 0.9em;">Action réalisée :</label>
        <input type="text" id="action-desc" placeholder="Ex: Semis, Plantation, Arrosage...">
        <button class="btn-save" onclick="saveAction()">Enregistrer l'action</button>
        <button class="btn-cancel" onclick="closeModal()">Fermer</button>
    </div>
</div>

<script>
    // Configuration globale
    const selectedMonth = "Mars 2026";
    const modal = document.getElementById('modal');
    let currentDay = 0;

    function init() {
        renderCalendar();
        updateBars();
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const heads = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
        
        // Entêtes
        heads.forEach(h => cal.innerHTML += `<div class="calendar-day-head">${h}</div>`);
        
        // 1er Mars 2026 = Dimanche. Donc 6 cases vides (Lun-Sam)
        for(let i=0; i<6; i++) cal.innerHTML += `<div class="calendar-day empty"></div>`;
        
        // Jours du mois
        for(let d=1; d<=31; d++) {
            let cls = "calendar-day";
            if(d === 10) cls += " today";
            if(d === 7 || d === 10) cls += " planted-day";
            cal.innerHTML += `<div class="${cls}" onclick="openModal(${d})">${d}</div>`;
        }
    }

    function openModal(day) {
        currentDay = day;
        document.getElementById('modal-date').innerText = day + " " + selectedMonth;
        modal.style.display = "block";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    function saveAction() {
        const p = document.getElementById('plant-select').value;
        const a = document.getElementById('action-desc').value;
        const msg = `LOG JARDIN : Le ${currentDay} ${selectedMonth}, action "${a}" sur "${p}"`;
        
        document.getElementById('output-section').style.display = "block";
        document.getElementById('output-text').innerText = msg;
        
        closeModal();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function updateBars() {
        const now = new Date();
        const data = [
            { id: "progres-pois", tid: "text-pois", start: "2026-03-07", cycle: 70 },
            { id: "progres-tomates", tid: "text-tomates", start: "2026-03-10", cycle: 120 }
        ];

        data.forEach(item => {
            const start = new Date(item.start);
            const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            const pct = Math.min(Math.max(Math.round((diff / item.cycle) * 100), 0), 100);
            
            const b = document.getElementById(item.id);
            if(b) b.style.width = pct + "%";
            
            const t = document.getElementById(item.tid);
            if(t) t.innerText = `⏳ ${pct}% du cycle accompli (${diff} jours passés)`;
        });
    }

    // Fermer le modal si on clique à côté
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }

    window.onload = init;
</script>

</body>
</html>
