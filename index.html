<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jardin Interactif - 2026</title>
    <style>
        :root {
            --green-dark: #1b5e20; --green-main: #4caf50; --green-soft: #e8f5e9;
            --earth: #795548; --white: #ffffff; --planted: #81c784; --tomato-red: #e53935;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f4; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        header { background: var(--green-dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        
        /* Calendrier Interactif */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day { padding: 15px 5px; background: #fafafa; border-radius: 5px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .calendar-day:hover { background: var(--green-soft); border-color: var(--green-main); }
        .calendar-day-head { font-weight: bold; padding: 10px; color: var(--earth); }
        .planted-day { background-color: var(--planted) !important; color: white; font-weight: bold; }
        .today { border: 2px solid var(--earth) !important; }

        /* Fenêtre Surgissante (Modal) */
        #modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 80%; max-width: 400px; border-radius: 15px; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ddd; }
        .btn-save { background: var(--green-main); color: white; font-weight: bold; border: none; cursor: pointer; }

        /* Progress Bar */
        .progress-bar { background: #ddd; border-radius: 20px; height: 14px; width: 100%; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s; }
        .fill-green { background: var(--green-main); }
        .fill-red { background: var(--tomato-red); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌿 Mon Jardin Interactif</h1>
        <p>Clique sur une date pour enregistrer une action</p>
    </header>

    <section class="card">
        <h2>📅 Mars 2026</h2>
        <div id="calendar" class="calendar-grid">
            </div>
    </section>

    <section class="card">
        <h2>📈 Suivi des "Gourmandes"</h2>
        <h3>🌱 Petits Pois "Karina"</h3>
        <div class="progress-bar"><div id="progres-pois" class="progress-fill fill-green"></div></div>
        <h3>🍅 Tomates "Cherokee Purple"</h3>
        <div class="progress-bar"><div id="progres-tomates" class="progress-fill fill-red"></div></div>
    </section>

    <section class="card" id="output-section" style="display:none; border: 2px dashed var(--green-main);">
        <h3>💾 Information à envoyer à Gemini</h3>
        <p>Copie ce texte et envoie-le moi pour que je mémorise l'action :</p>
        <code id="output-text" style="display:block; background:#eee; padding:10px;"></code>
    </section>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-date">Action au jardin</h3>
        <select id="plant-select">
            <option value="Courgettes Rheinau Gold">Courgettes Rheinau Gold</option>
            <option value="Tomates Cherokee Purple">Tomates Cherokee Purple</option>
            <option value="Pois Karina">Pois Karina</option>
            <option value="Autre">Autre observation</option>
        </select>
        <input type="text" id="action-desc" placeholder="Ex: Semis, plantation, arrosage...">
        <button class="btn-save" onclick="saveAction()">Enregistrer l'action</button>
        <button onclick="closeModal()">Annuler</button>
    </div>
</div>

<script>
    const calendar = document.getElementById('calendar');
    const modal = document.getElementById('modal');
    let selectedDate = "";

    // Génération du calendrier
    function initCalendar() {
        const heads = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
        heads.forEach(h => calendar.innerHTML += `<div class="calendar-day-head">${h}</div>`);
        
        for(let i=0; i<6; i++) calendar.innerHTML += `<div class="calendar-day empty"></div>`; // Décalage Mars 2026
        
        for(let d=1; d<=31; d++) {
            let isToday = (d === 10) ? "today" : "";
            let isPlanted = (d === 7 || d === 10) ? "planted-day" : "";
            calendar.innerHTML += `<div class="calendar-day ${isToday} ${isPlanted}" onclick="openModal(${d})">${d}</div>`;
        }
    }

    function openModal(day) {
        selectedDate = day + " Mars 2026";
        document.getElementById('modal-date').innerText = selectedDate;
        modal.style.display = "block";
    }

    function closeModal() { modal.style.display = "none"; }

    function saveAction() {
        const plante = document.getElementById('plant-select').value;
        const desc = document.getElementById('action-desc').value;
        const output = `Action du ${selectedDate} : ${desc} pour ${plante}`;
        
        document.getElementById('output-section').style.display = "block";
        document.getElementById('output-text').innerText = output;
        
        closeModal();
        alert("Action préparée ! Copie le texte en bas de page pour me l'envoyer.");
    }

    // Gestion des barres de progression
    function updateProgress() {
        const today = new Date();
        const cultures = [
            { id: "progres-pois", debut: "2026-03-07", duree: 70 },
            { id: "progres-tomates", debut: "2026-03-10", duree: 120 }
        ];
        cultures.forEach(c => {
            const jours = Math.floor((today - new Date(c.debut)) / (1000*60*60*24));
            document.getElementById(c.id).style.width = Math.min(Math.round((jours/c.duree)*100), 100) + "%";
        });
    }

    window.onload = () => { initCalendar(); updateProgress(); };
</script>

</body>
</html>
