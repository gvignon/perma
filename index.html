<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jardin Interactif 2026</title>
    <style>
        :root {
            --green-dark: #1b5e20; --green-main: #4caf50; --green-soft: #e8f5e9;
            --earth: #795548; --white: #ffffff; --planted: #81c784; --tomato-red: #e53935;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f4; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        header { background: var(--green-dark); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--green-dark); border-bottom: 2px solid var(--green-soft); padding-bottom: 8px; margin-top: 0; }
        
        .month-selector { width: 100%; padding: 12px; font-size: 1.1em; border-radius: 8px; border: 2px solid var(--green-main); margin-bottom: 15px; background: white; font-weight: bold; color: var(--green-dark); }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .calendar-day-head { font-weight: bold; padding: 5px; color: var(--earth); font-size: 0.8em; }
        .calendar-day { padding: 12px 2px; background: #fafafa; border-radius: 5px; cursor: pointer; border: 1px solid transparent; font-size: 0.9em; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .calendar-day:hover { background: var(--green-soft); border-color: var(--green-main); }
        .empty { background: transparent; cursor: default; }
        .planted-day { background-color: var(--planted) !important; color: white; font-weight: bold; position: relative; }
        .planted-day::after { content: "🌱"; display: block; font-size: 0.7em; position: absolute; bottom: 2px; }
        .today { border: 2px solid var(--earth) !important; font-weight: bold; }

        #modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .btn-save { background: var(--green-main); color: white; font-weight: bold; border: none; cursor: pointer; }

        .progress-bar { background: #ddd; border-radius: 20px; height: 14px; width: 100%; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: width 1s; }
        .fill-green { background: var(--green-main); }
        .fill-red { background: var(--tomato-red); }
        small { display: block; margin-bottom: 15px; font-style: italic; color: #666; }
        .plant-title { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌿 Mon Jardin Interactif</h1>
        <p>Saison Complète 2026</p>
    </header>

    <section class="card">
        <h2>📅 Calendrier de Culture</h2>
        <select id="month-select" class="month-selector" onchange="renderCalendar()">
            <option value="2">Mars 2026</option>
            <option value="3">Avril 2026</option>
            <option value="4">Mai 2026</option>
            <option value="5">Juin 2026</option>
            <option value="6">Juillet 2026</option>
            <option value="7">Août 2026</option>
            <option value="8">Septembre 2026</option>
        </select>
        <div id="calendar" class="calendar-grid"></div>
    </section>

    <section class="card">
        <h2>📈 Croissance en cours</h2>
        
        <div class="plant-title">🌱 Petit Pois "Karina" (07/03)</div>
        <div class="progress-bar"><div id="progres-pois" class="progress-fill fill-green"></div></div>
        <small id="text-pois"></small>

        <div class="plant-title">🍅 Tomate "Cherokee Purple" (10/03)</div>
        <div class="progress-bar"><div id="progres-tomates" class="progress-fill fill-red"></div></div>
        <small id="text-tomates"></small>
    </section>

    <div id="output-section" style="display:none;" class="card">
        <h3>💾 Copie pour Gemini</h3>
        <code id="output-text" style="display:block; background:#eee; padding:10px; border-radius:5px; word-break: break-all;"></code>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modal-date" style="margin-top:0; color:var(--green-dark);">Action</h3>
        <label>Quelle plante ?</label>
        <select id="plant-select">
            <optgroup label="Légumes Fruits">
                <option value="Tomate Cherokee Purple">Tomate Cherokee Purple</option>
                <option value="Courgette Rheinau Gold">Courgette Rheinau Gold</option>
                <option value="Concombre Arola">Concombre Arola</option>
                <option value="Melon Farthest North Mix">Melon Farthest North Mix</option>
                <option value="Kiwano Jelly Round">Kiwano Jelly Round</option>
                <option value="Chayotte">Chayotte (Christophine)</option>
            </optgroup>
            <optgroup label="Racines et Tubercules">
                <option value="Carotte Demi-Longue de Luc">Carotte Demi-Longue de Luc</option>
                <option value="Carotte Rouge Sang">Carotte Rouge Sang</option>
                <option value="Panais Tender And True">Panais Tender And True</option>
                <option value="Navet De Nancy">Navet De Nancy</option>
                <option value="Céleri Rave Ortho">Céleri Rave Ortho</option>
                <option value="Persil tubéreux Halblange">Persil tubéreux Halblange</option>
                <option value="Pommes de terre">Pommes de terre</option>
            </optgroup>
            <optgroup label="Légumineuses">
                <option value="Pois Karina">Pois Karina</option>
                <option value="Haricot Contender">Haricot Contender</option>
            </optgroup>
            <optgroup label="Autres">
                <option value="Radis Flamboyant">Radis Flamboyant</option>
                <option value="Maïs Golden Bantam">Maïs Golden Bantam</option>
                <option value="Maïs True Gold">Maïs True Gold</option>
                <option value="Laitue / Roquette / Blettes">Feuilles (Laitue, Blettes...)</option>
                <option value="Aromatiques / Fleurs">Aromatiques & Fleurs</option>
                <option value="Autre">Autre observation</option>
            </optgroup>
        </select>
        <label>Que faites-vous ?</label>
        <input type="text" id="action-desc" placeholder="Ex: Semis, plantation, récolte...">
        <button class="btn-save" onclick="saveAction()">Enregistrer</button>
        <button style="background:#eee; border:none; cursor:pointer;" onclick="closeModal()">Annuler</button>
    </div>
</div>

<script>
    const monthData = [
        { name: "Mars", days: 31, startEmpty: 6 },
        { name: "Avril", days: 30, startEmpty: 2 }, 
        { name: "Mai", days: 31, startEmpty: 4 },
        { name: "Juin", days: 30, startEmpty: 0 },
        { name: "Juillet", days: 31, startEmpty: 2 },
        { name: "Août", days: 31, startEmpty: 5 },
        { name: "Septembre", days: 30, startEmpty: 1 }
    ];

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        const mIdx = parseInt(document.getElementById('month-select').value) - 2;
        const data = monthData[mIdx];
        cal.innerHTML = "";
        
        ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(h => cal.innerHTML += `<div class="calendar-day-head">${h}</div>`);
        
        for(let i=0; i<data.startEmpty; i++) cal.innerHTML += `<div class="calendar-day empty"></div>`;
        
        for(let d=1; d<=data.days; d++) {
            let cls = "calendar-day";
            if(d === 10 && mIdx === 0) cls += " today";
            if(mIdx === 0 && (d === 7 || d === 10)) cls += " planted-day";
            cal.innerHTML += `<div class="${cls}" onclick="openModal('${d} ${data.name}')">${d}</div>`;
        }
    }

    function openModal(date) {
        document.getElementById('modal-date').innerText = date + " 2026";
        document.getElementById('modal').style.display = "block";
    }

    function closeModal() { document.getElementById('modal').style.display = "none"; }

    function saveAction() {
        const p = document.getElementById('plant-select').value;
        const a = document.getElementById('action-desc').value;
        const d = document.getElementById('modal-date').innerText;
        document.getElementById('output-section').style.display = "block";
        document.getElementById('output-text').innerText = `LOG JARDIN : Le ${d}, action "${a}" sur "${p}"`;
        closeModal();
        window.scrollTo(0, document.body.scrollHeight);
    }

    function updateProgress() {
        const today = new Date();
        const cultures = [
            { id: "progres-pois", tid: "text-pois", start: "2026-03-07", cycle: 70 },
            { id: "progres-tomates", tid: "text-tomates", start: "2026-03-10", cycle: 120 }
        ];
        cultures.forEach(c => {
            const diff = Math.floor((today - new Date(c.start)) / (1000*60*60*24));
            const pct = Math.min(Math.max(Math.round((diff/c.cycle)*100), 0), 100);
            document.getElementById(c.id).style.width = pct + "%";
            document.getElementById(c.tid).innerText = `⏳ ${pct}% du cycle (${diff} j)`;
        });
    }

    window.onload = () => { renderCalendar(); updateProgress(); };
</script>
</body>
</html>
